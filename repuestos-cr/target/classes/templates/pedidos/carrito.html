<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{general/fragmentos :: head}"/>

<body>

<header th:replace="~{general/fragmentos :: header}"/>

<div th:replace="~{general/fragmentos :: mostrarToast}"></div>

<main class="container py-5">

    <h2 class="fw-bold mb-4">
        Carrito de Compras
    </h2>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">
        <tr>
            <th>Repuesto</th>
            <th>Marca</th>
            <th>Precio</th>
            <th>Cantidad</th>
            <th>Subtotal</th>
            <th>Acción</th>
        </tr>
        </thead>

        <tbody>

        <tr>
            <td>Filtro de Aceite</td>
            <td>Toyota</td>
            <td>₡5 000</td>
            <td>2</td>
            <td>₡10 000</td>
            <td>
                <button class="btn btn-danger btn-sm">
                    Eliminar
                </button>
            </td>
        </tr>

        <tr>
            <td>Pastillas de Freno</td>
            <td>Honda</td>
            <td>₡12 500</td>
            <td>1</td>
            <td>₡12 500</td>
            <td>
                <button class="btn btn-danger btn-sm">
                    Eliminar
                </button>
            </td>
        </tr>

        </tbody>

    </table>

    <div class="text-end">

        <h4>Total: ₡22 500</h4>

        <button class="btn btn-success">
            Confirmar Pedido
        </button>

    </div>

</main>

<footer th:replace="~{general/fragmentos :: footer}"/>

</body>
</html>
