<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head}"/>
<body>

<header th:replace="~{general/fragmentos :: header}"/>

<div th:replace="~{general/fragmentos :: mostrarToast}"></div>

<main class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0 mt-5">
                <div class="card-header bg-dark text-white py-3">
                    <h4 class="mb-0 fw-bold"><i class="fas fa-sign-in-alt me-2"></i>Iniciar sesion</h4>
                </div>
                <div class="card-body p-4">

                    <form th:action="@{/login}" th:object="${usuario}" method="post">
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Correo electronico</label>
                            <input type="email" id="email" th:field="*{email}" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">Contrasena</label>
                            <input type="password" id="password" th:field="*{password}" class="form-control" required/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-sign-in-alt me-2"></i>Entrar
                        </button>
                    </form>

                    <p class="text-center small text-muted mt-3 mb-0">
                        ¿No tienes cuenta?
                        <a th:href="@{/registro}">Registrate aqui</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{general/fragmentos :: footer}"/>
</body>
</html>
