<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head}"/>
<body>

<header th:replace="~{general/fragmentos :: header}"/>

<div th:replace="~{general/fragmentos :: mostrarToast}"></div>

<div class="bg-light py-4 border-bottom">
    <div class="container d-flex align-items-center justify-content-between flex-wrap gap-3">
        <div>
            <h2 class="fw-bold mb-0"><i class="fas fa-boxes text-warning me-2"></i>Reporte de Inventario</h2>
            <p class="text-muted mb-0 small">Stock actual de repuestos y alertas de bajo inventario</p>
        </div>
        <div th:if="${totalAlertas > 0}" class="alert alert-danger mb-0 py-2 px-3">
            <i class="fas fa-triangle-exclamation me-2"></i>
            <span th:text="${totalAlertas}">0</span> repuesto(s) con stock bajo
        </div>
    </div>
</div>

<main class="container py-4">
    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="py-3 ps-4">#</th>
                        <th class="py-3">Repuesto</th>
                        <th class="py-3 text-end">Stock actual</th>
                        <th class="py-3 text-end">Stock minimo</th>
                        <th class="py-3 text-center">Estado</th>
                        <th class="py-3 text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(inventario)}">
                        <td colspan="6" class="text-center text-muted py-5">
                            No hay registros de inventario.
                        </td>
                    </tr>
                    <tr th:each="i : ${inventario}"
                        th:classappend="${i.cantidadActual < i.cantidadMinima} ? 'table-danger' : ''">
                        <td class="py-3 ps-4 fw-bold text-muted" th:text="${i.idInventario}">1</td>
                        <td class="py-3 fw-semibold" th:text="${i.repuesto.nombre}">Pastilla de freno</td>
                        <td class="py-3 text-end" th:text="${i.cantidadActual}">0</td>
                        <td class="py-3 text-end" th:text="${i.cantidadMinima}">0</td>
                        <td class="py-3 text-center">
                            <span th:if="${i.cantidadActual < i.cantidadMinima}" class="badge bg-danger">Stock bajo</span>
                            <span th:unless="${i.cantidadActual < i.cantidadMinima}" class="badge bg-success">OK</span>
                        </td>
                        <td class="py-3 text-center">
                            <a th:href="@{/inventario/actualizar/{id}(id=${i.idInventario})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="fas fa-edit me-1"></i>Actualizar stock
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer th:replace="~{general/fragmentos :: footer}"/>
</body>
</html>
