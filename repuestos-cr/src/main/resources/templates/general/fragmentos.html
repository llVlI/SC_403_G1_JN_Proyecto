<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AutoPartes CR</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"/>
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.css}"/>
    <link rel="stylesheet" th:href="@{/css/estilos.css}"/>
</head>
<body>

<header th:fragment="header" class="bg-dark">
    <div class="container d-flex align-items-center justify-content-between py-3">
        <div class="d-flex align-items-center gap-2">
            <i class="fas fa-car-battery text-warning fa-lg"></i>
            <h1 class="mb-0 fw-bold fs-4 text-white">AutoPartes <span class="text-warning">CR</span></h1>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
        <div class="container">
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}"><i class="fas fa-home me-1"></i>Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a th:if="${session.usuarioLogueado != null and session.usuarioLogueado.rol.nombre == 'ADMINISTRADOR'}"
   class="nav-link" th:href="@{/inventario}"><i class="fas fa-boxes me-1"></i>Inventario</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/repuestos}">
                            <i class="fas fa-cogs me-1"></i>Repuestos
                        </a>
                    </li>
                </ul>
                <!-- Si HAY alguien logueado: saludo + Cerrar sesion -->
                <span th:if="${session.usuarioLogueado != null}" class="text-white-50 small me-3">
                    <i class="fas fa-user-circle me-1"></i>
                    Hola, <span th:text="${session.usuarioLogueado.nombre}">Usuario</span>
                </span>
                <a th:if="${session.usuarioLogueado != null}" th:href="@{/logout}"
                   class="btn btn-outline-light btn-sm">
                    <i class="fas fa-sign-out-alt me-1"></i>Cerrar sesion
                </a>

                <!-- Si NO hay nadie logueado: Iniciar sesion + Registrarse -->
                <a th:if="${session.usuarioLogueado == null}" th:href="@{/login}"
                   class="btn btn-outline-light btn-sm me-2">
                    <i class="fas fa-sign-in-alt me-1"></i>Iniciar sesion
                </a>
                <a th:if="${session.usuarioLogueado == null}" th:href="@{/registro}"
                   class="btn btn-warning btn-sm fw-semibold">
                    <i class="fas fa-user-plus me-1"></i>Registrarse
                </a>
            </div>
        </div>
    </nav>
</header>

<footer th:fragment="footer" class="bg-dark text-white mt-5 py-4">
    <div class="container">
        <p class="text-center small text-white-50 mb-0">
            &copy; 2026 AutoPartes CR - Repuestos RB
        </p>
    </div>

   
    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</footer>

<!-
<section th:fragment="mostrarToast">
    <div aria-live="polite" aria-atomic="true"
         class="position-fixed top-50 start-50 translate-middle" style="z-index: 1080;">
        <div th:if="${error}" class="toast show" role="alert" data-bs-autohide="true">
            <div class="toast-header text-white bg-danger">
                <i class="fas fa-triangle-exclamation me-2"></i>
                <strong class="me-auto">Error</strong>
            </div>
            <div class="toast-body">
                <p th:text="${error}">Mensaje de error</p>
                <div class="mt-2 pt-2 border-top text-center">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="toast">Cerrar</button>
                </div>
            </div>
        </div>
        <div th:if="${todoOk}" class="toast show" role="status" data-bs-autohide="true">
            <div class="toast-header text-white bg-success">
                <i class="fas fa-circle-check me-2"></i>
                <strong class="me-auto">Atencion</strong>
            </div>
            <div class="toast-body">
                <p th:text="${todoOk}">Mensaje de exito</p>
                <div class="mt-2 pt-2 border-top text-center">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="toast">Cerrar</button>
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
