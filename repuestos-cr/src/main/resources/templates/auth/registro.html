<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head}"/>
<body>

<header th:replace="~{general/fragmentos :: header}"/>

<div th:replace="~{general/fragmentos :: mostrarToast}"></div>

<main class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0 mt-5">
                <div class="card-header bg-dark text-white py-3">
                    <h4 class="mb-0 fw-bold"><i class="fas fa-user-plus me-2"></i>Crear cuenta de cliente</h4>
                </div>
                <div class="card-body p-4">

                    <form th:action="@{/registro/guardar}" th:object="${cliente}" method="post">
                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-semibold">Nombre completo</label>
                            <input type="text" id="nombre" th:field="*{usuario.nombre}" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">Correo electronico</label>
                            <input type="email" id="email" th:field="*{usuario.email}" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">Contrasena</label>
                            <input type="password" id="password" th:field="*{usuario.password}" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label for="telefono" class="form-label fw-semibold">Telefono</label>
                            <input type="text" id="telefono" th:field="*{telefono}" class="form-control" required/>
                        </div>
                        <div class="mb-3">
                            <label for="direccion" class="form-label fw-semibold">Direccion</label>
                            <input type="text" id="direccion" th:field="*{direccion}" class="form-control" required/>
                        </div>
                        <button type="submit" class="btn btn-warning w-100 fw-semibold">
                            <i class="fas fa-user-plus me-2"></i>Registrarme
                        </button>
                    </form>

                    <p class="text-center small text-muted mt-3 mb-0">
                        ¿Ya tienes cuenta?
                        <a th:href="@{/login}">Inicia sesion</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{general/fragmentos :: footer}"/>
</body>
</html>
